name: Specmatic CI/CD

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      PORT: 3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npx prisma generate

      - name: Start API
        run: npm start &

      - name: Wait for API
        run: npx wait-on http://localhost:3000/actuator/mappings

      - name: Run Specmatic Tests
        run: |
          npx specmatic test \
            openapi.yaml \
            --testBaseURL=http://localhost:3000/api/v1 \
            --junitReportDir=./build/reports/specmatic

      - name: Upload Specmatic Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-report
          path: build/reports/specmatic
          retention-days: 30

      - name: Fail workflow if Specmatic tests failed
        run: |
          if grep -R 'failures="[1-9]' build/reports/specmatic; then
            echo "❌ Specmatic contract tests failed."
            exit 1
          fi

          if grep -R 'errors="[1-9]' build/reports/specmatic; then
            echo "❌ Specmatic contract tests had errors."
            exit 1
          fi

          echo "✅ All Specmatic tests passed."

  deploy:
    needs: test
    if: ${{ needs.test.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Render
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
